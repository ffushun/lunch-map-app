<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>神田ランチマップ</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <h1>神田ランチマップ</h1>
      <div class="form-row">
        <label for="email">メール</label>
        <input type="email" id="email" placeholder="your@example.com" />
      </div>
      <div class="form-row">
        <label for="password">パスワード</label>
        <input type="password" id="password" placeholder="********" />
      </div>
      <div class="button-row">
        <button id="login-btn">ログイン</button>
      </div>
      <p class="note">アカウントは管理者が事前登録します</p>
    </div>
  </div>

  <div id="app-screen" class="app-screen hidden">
    <div id="map"></div>

    <div class="top-bar">
      <div class="brand">神田ランチマップ</div>
      <div class="top-actions">
        <span id="user-info"></span>
        <button id="logout-btn" class="secondary">ログアウト</button>
      </div>
    </div>

    <div id="search-panel" class="search-panel">
      <div class="search-block">
        <div class="search-block-title">投稿検索</div>
        <div class="search-row">
          <div class="search-field">
            <label for="search-shop-name">店舗名</label>
            <input type="text" id="search-shop-name" placeholder="例: ラーメン、食堂" />
          </div>
          <div class="search-field">
            <label for="search-poster-name">投稿者名</label>
            <input type="text" id="search-poster-name" placeholder="例: 福田" />
          </div>
          <div class="search-field small">
            <label for="search-rating-min">評価以上</label>
            <select id="search-rating-min">
              <option value="">指定なし</option>
              <option value="1">★1以上</option>
              <option value="2">★2以上</option>
              <option value="3">★3以上</option>
              <option value="4">★4以上</option>
              <option value="5">★5のみ</option>
            </select>
          </div>
          <div class="search-buttons">
            <button id="search-btn">検索</button>
            <button id="clear-search-btn" class="secondary">クリア</button>
          </div>
        </div>

        <div id="search-summary" class="search-summary">全件表示中</div>
        <div id="search-result-list" class="search-result-list"></div>
      </div>

      <div class="search-block nominatim-block">
        <div class="search-block-title">場所検索（Nominatim）</div>
        <div class="search-row nominatim-row">
          <div class="search-field">
            <label for="place-search-input">店舗候補 / 地名 / 住所</label>
            <input type="text" id="place-search-input" placeholder="例: 神田 カレー / 秋葉原 ラーメン" />
          </div>
          <div class="search-buttons">
            <button id="place-search-btn">場所検索</button>
            <button id="clear-place-search-btn" class="secondary">候補クリア</button>
          </div>
        </div>

        <div class="search-note">
          検索候補をクリックすると、その位置に仮ピンを立てて投稿フォームを開きます
        </div>
        <div id="place-search-result-list" class="search-result-list"></div>
      </div>
    </div>

    <div id="hint-box" class="hint-box">
      地図をクリックすると新しい投稿フォームが開きます
    </div>

    <div id="post-form-panel" class="side-panel hidden">
      <div class="panel-header">
        <h2>新規投稿</h2>
        <button id="close-form-btn" class="icon-btn">×</button>
      </div>

      <div class="form-row">
        <label for="poster-name">投稿者名</label>
        <input type="text" id="poster-name" placeholder="例: 福田" />
      </div>

      <div class="form-row">
        <label for="shop-name">店舗名</label>
        <input type="text" id="shop-name" placeholder="例: ○○食堂" />
      </div>

      <div class="form-row">
        <label>評価</label>
        <div id="rating-stars" class="rating-stars">
          <button type="button" class="star-btn" data-rating="1">☆</button>
          <button type="button" class="star-btn" data-rating="2">☆</button>
          <button type="button" class="star-btn" data-rating="3">☆</button>
          <button type="button" class="star-btn" data-rating="4">☆</button>
          <button type="button" class="star-btn" data-rating="5">☆</button>
        </div>
      </div>

      <div class="form-row">
        <label for="photo">写真</label>
        <input type="file" id="photo" accept="image/*" />
      </div>

      <div class="form-row">
        <label for="latitude">緯度</label>
        <input type="number" id="latitude" step="any" readonly />
      </div>

      <div class="form-row">
        <label for="longitude">経度</label>
        <input type="number" id="longitude" step="any" readonly />
      </div>

      <div class="button-row">
        <button id="save-post-btn">投稿する</button>
        <button id="clear-pin-btn" class="secondary">仮ピン解除</button>
      </div>
    </div>

    <div id="detail-panel" class="side-panel hidden">
      <div class="panel-header">
        <h2>投稿詳細</h2>
        <button id="close-detail-btn" class="icon-btn">×</button>
      </div>

      <div id="detail-content" class="detail-content"></div>

      <div id="edit-post-section" class="edit-post-section hidden">
        <h3>投稿編集</h3>
        <div class="form-row">
          <label for="edit-poster-name">投稿者名</label>
          <input type="text" id="edit-poster-name" />
        </div>

        <div class="form-row">
          <label for="edit-shop-name">店舗名</label>
          <input type="text" id="edit-shop-name" />
        </div>

        <div class="form-row">
          <label>評価</label>
          <div id="edit-rating-stars" class="rating-stars">
            <button type="button" class="edit-star-btn" data-rating="1">☆</button>
            <button type="button" class="edit-star-btn" data-rating="2">☆</button>
            <button type="button" class="edit-star-btn" data-rating="3">☆</button>
            <button type="button" class="edit-star-btn" data-rating="4">☆</button>
            <button type="button" class="edit-star-btn" data-rating="5">☆</button>
          </div>
        </div>

        <div class="button-row">
          <button id="save-edit-post-btn">編集内容を保存</button>
          <button id="cancel-edit-post-btn" class="secondary">編集をやめる</button>
        </div>
      </div>

      <div class="comment-section">
        <h3>コメント</h3>
        <div id="comment-list" class="comment-list"></div>

        <div class="form-row">
          <label for="commenter-name">コメント投稿者名</label>
          <input type="text" id="commenter-name" placeholder="例: 福田" />
        </div>

        <div class="form-row">
          <label for="comment-text">コメント</label>
          <textarea id="comment-text" rows="4" placeholder="コメントを入力"></textarea>
        </div>

        <div class="button-row">
          <button id="add-comment-btn">コメント追加</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
